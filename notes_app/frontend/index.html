<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人笔记管理系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <h1><i class="fas fa-sticky-note"></i> 个人笔记管理</h1>
            <div class="header-actions">
                <button onclick="toggleCategoryModal()" class="btn btn-secondary">
                    <i class="fas fa-folder-plus"></i> 分类管理
                </button>
                <button onclick="openNoteForm()" class="btn btn-primary">
                    <i class="fas fa-plus"></i> 新建笔记
                </button>
            </div>
        </header>

        <div class="main-content">
            <aside class="sidebar">
                <div class="search-section">
                    <input type="text" id="searchInput" placeholder="搜索笔记..." onkeyup="handleSearch()">
                </div>

                <div class="filter-section">
                    <h3>筛选</h3>
                    <div class="filter-group">
                        <label><input type="checkbox" id="showArchived" onchange="handleFilterChange()"> 显示归档</label>
                    </div>
                    <div class="filter-group">
                        <label><input type="checkbox" id="showFavorites" onchange="handleFilterChange()"> 仅收藏</label>
                    </div>
                </div>

                <div class="category-section">
                    <h3>分类</h3>
                    <div id="categoryList" class="category-list">
                        <div class="category-item active" data-id="" onclick="filterByCategory('')">
                            <span class="category-dot" style="background-color: #999;"></span>
                            <span>全部</span>
                            <span class="category-count">0</span>
                        </div>
                    </div>
                </div>

                <div class="tag-section">
                    <h3>标签</h3>
                    <div id="tagList" class="tag-list">
                        <span class="tag-item active" data-id="" onclick="filterByTag('')">全部</span>
                    </div>
                </div>
            </aside>

            <main class="note-list-container">
                <div class="list-header">
                    <h2 id="listTitle">所有笔记</h2>
                    <div class="view-toggle">
                        <button id="gridViewBtn" class="view-btn active" onclick="switchView('grid')">
                            <i class="fas fa-th"></i>
                        </button>
                        <button id="listViewBtn" class="view-btn" onclick="switchView('list')">
                            <i class="fas fa-list"></i>
                        </button>
                    </div>
                </div>

                <div id="noteList" class="note-list grid-view">
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <p>暂无笔记，点击右上角新建</p>
                    </div>
                </div>
            </main>
        </div>

        <div id="noteModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="modalTitle">新建笔记</h3>
                    <button class="close-btn" onclick="closeNoteModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <form id="noteForm" onsubmit="saveNote(event)">
                    <input type="hidden" id="noteId">
                    <div class="form-group">
                        <label for="noteTitle">标题</label>
                        <input type="text" id="noteTitle" required placeholder="输入笔记标题">
                    </div>
                    <div class="form-group">
                        <label for="noteCategory">分类</label>
                        <select id="noteCategory">
                            <option value="">未分类</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="noteTags">标签 (逗号分隔)</label>
                        <input type="text" id="noteTags" placeholder="如: 工作, 重要">
                    </div>
                    <div class="form-group">
                        <label for="noteContent">内容</label>
                        <textarea id="noteContent" rows="8" placeholder="输入笔记内容..."></textarea>
                    </div>
                    <div class="form-group form-check">
                        <label><input type="checkbox" id="noteFavorite"> 设为收藏</label>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" onclick="closeNoteModal()">取消</button>
                        <button type="submit" class="btn btn-primary">保存</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="categoryModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>分类管理</h3>
                    <button class="close-btn" onclick="toggleCategoryModal()">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="category-modal-content">
                    <div class="form-group">
                        <label for="newCategoryName">分类名称</label>
                        <input type="text" id="newCategoryName" placeholder="输入分类名称">
                    </div>
                    <div class="form-group">
                        <label for="newCategoryColor">颜色标识</label>
                        <input type="color" id="newCategoryColor" value="#1E90FF">
                    </div>
                    <button class="btn btn-primary" onclick="addCategory()">添加分类</button>
                    
                    <div id="categoryManageList" class="category-manage-list">
                    </div>
                </div>
            </div>
        </div>

        <div id="confirmModal" class="modal">
            <div class="modal-content confirm-modal">
                <div class="modal-header">
                    <h3>确认操作</h3>
                </div>
                <p id="confirmMessage">确定要执行此操作吗？</p>
                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="closeConfirmModal()">取消</button>
                    <button class="btn btn-danger" onclick="executeConfirm()">确定</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
